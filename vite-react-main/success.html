<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Access Code — Osaka Castle One Coin Tour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --ink: #1c1a17;
    --paper: #f2ede3;
    --stone: #8a8378;
    --gold: #a8823a;
    --deep-green: #2f3b2f;
    --rule: #d8d0bf;
    --vermilion: #b5452c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 400px;
    width: 100%;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 34px 28px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--vermilion);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    margin-bottom: 20px;
  }

  .code-box {
    background: var(--paper);
    border: 1.5px dashed var(--gold);
    border-radius: 10px;
    padding: 22px;
    margin-bottom: 18px;
  }
  .code {
    font-family: 'Shippori Mincho', serif;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--vermilion);
  }
  .code-label {
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .expiry {
    font-size: 12.5px;
    color: var(--stone);
    margin-bottom: 26px;
  }
  .expiry b { color: var(--ink); }

  .btn {
    display: block;
    font-family: 'Shippori Mincho', serif;
    font-size: 14.5px;
    text-decoration: none;
    color: #fff;
    background: var(--vermilion);
    padding: 15px;
    border-radius: 30px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .btn.alt {
    background: var(--deep-green);
  }

  .status {
    font-size: 13px;
    color: var(--stone);
  }
  .error {
    color: var(--vermilion);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="eyebrow">Payment Confirmed</div>
  <h1 id="status">Preparing your access code…</h1>
  <div id="content"></div>
</div>

<script>
  // Adjust this if your Vercel project uses a different domain
  const API_BASE = ''; // '' = same domain as this page

  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  const statusEl = document.getElementById('status');
  const contentEl = document.getElementById('content');

  if (!sessionId) {
    statusEl.textContent = 'Something went wrong';
    contentEl.innerHTML = '<p class="error">No payment session was found. If you just paid, please check your email receipt or contact us.</p>';
  } else {
    fetch(API_BASE + '/api/verify-purchase?session_id=' + encodeURIComponent(sessionId))
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          statusEl.textContent = 'Something went wrong';
          contentEl.innerHTML = '<p class="error">' + data.error + '</p>';
          return;
        }
        const hours = Math.round((data.expiresAt - Date.now()) / 3600000);
        statusEl.textContent = "You're all set!";
        contentEl.innerHTML =
          '<div class="code-box">' +
            '<div class="code">' + data.code + '</div>' +
            '<div class="code-label">Your Access Code</div>' +
          '</div>' +
          '<p class="expiry">Valid for <b>' + hours + ' hours</b>. Enter this code when you reach either starting point.</p>' +
          '<a class="btn" href="https://YOUR-DOMAIN/gate.html?route=a">Start Route A (JR Station)</a>' +
          '<a class="btn alt" href="https://YOUR-DOMAIN/gate.html?route=b">Start Route B (Tanimachi)</a>';
      })
      .catch(() => {
        statusEl.textContent = 'Something went wrong';
        contentEl.innerHTML = '<p class="error">We couldn\'t reach the server. Please refresh this page, or contact us if the problem continues.</p>';
      });
  }
</script>

</body>
</html>
