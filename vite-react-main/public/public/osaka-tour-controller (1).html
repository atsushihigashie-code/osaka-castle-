<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osaka Castle Tour — Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --crimson: #8B1A1A; --navy: #1A1F3C; --gold: #C9A84C;
    --cream: #F5F0E8; --dark: #0D0F1E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--cream); font-family: 'EB Garamond', serif; min-height: 100vh; padding: 20px; }
  header { text-align: center; padding: 20px 0 24px; border-bottom: 1px solid var(--gold); margin-bottom: 24px; }
  header h1 { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.15em; }
  header p { font-size: 0.8rem; color: #888; margin-top: 5px; }

  /* ── Tour Switcher ─────────────────────────── */
  .tour-switcher { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(26,31,60,0.5); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: 5px; }
  .tour-tab { flex: 1; padding: 10px 8px; border-radius: 6px; border: none; background: transparent; color: #888; font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; line-height: 1.4; }
  .tour-tab.active { background: var(--crimson); color: var(--cream); }
  .tour-tab:not(.active):hover { color: var(--gold); background: rgba(201,168,76,0.08); }

  .status-bar {
    background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px; padding: 10px 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .status-bar .lbl { font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }
  .status-bar .val { font-size: 0.9rem; color: var(--cream); font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; display: inline-block; margin-right: 5px; }
  .dot.live { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
  .dot.err  { background: #e55; }

  .now-playing {
    background: rgba(139,26,26,0.18); border: 1px solid rgba(139,26,26,0.5);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: none;
  }
  .np-lbl { font-family: 'Cinzel', serif; font-size: 0.6rem; color: #C05050; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 5px; }
  .np-title { font-size: 0.95rem; color: var(--cream); }
  .prog-wrap { background: rgba(255,255,255,0.1); border-radius: 3px; height: 3px; margin-top: 8px; }
  .prog-fill { height: 100%; background: var(--gold); border-radius: 3px; width: 0%; transition: width 0.4s linear; }

  .main-controls { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .ctrl-btn { flex: 1; min-width: 100px; padding: 11px 8px; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid; }
  .ctrl-prev { background: transparent; border-color: rgba(201,168,76,0.5); color: var(--gold); }
  .ctrl-prev:hover { background: rgba(201,168,76,0.1); }
  .ctrl-next { background: var(--crimson); border-color: var(--crimson); color: var(--cream); }
  .ctrl-next:hover { background: #A52020; }
  .ctrl-replay { background: transparent; border-color: rgba(201,168,76,0.2); color: #777; flex: 0; min-width: 80px; }
  .ctrl-replay:hover { color: var(--gold); border-color: var(--gold); }

  .sec-lbl { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.7; }
  hr { border: none; border-top: 1px solid rgba(201,168,76,0.12); margin: 16px 0; }

  .slides-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 24px; }
  .slide-btn {
    background: rgba(26,31,60,0.7); border: 1px solid rgba(201,168,76,0.2);
    border-radius: 7px; padding: 12px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 12px; transition: all 0.2s;
    text-align: left; color: var(--cream); width: 100%;
  }
  .slide-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.07); }
  .slide-btn.active { border-color: var(--gold); background: rgba(139,26,26,0.28); box-shadow: 0 0 10px rgba(139,26,26,0.3); }
  .slide-num { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); min-width: 32px; text-align: center; font-weight: 700; }
  .slide-info { flex: 1; }
  .slide-title { font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--cream); letter-spacing: 0.04em; line-height: 1.3; }
  .slide-sub { font-size: 0.67rem; color: #888; margin-top: 2px; }
  .audio-badge { font-size: 0.58rem; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.35); color: var(--gold); padding: 2px 5px; border-radius: 3px; }

  .session-box { background: rgba(26,31,60,0.5); border: 1px solid rgba(201,168,76,0.18); border-radius: 8px; padding: 14px 16px; text-align: center; }
  .s-lbl { font-family: 'Cinzel', serif; font-size: 0.6rem; color: #777; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .s-url { font-size: 0.68rem; color: #aaa; margin-top: 6px; word-break: break-all; }
  .s-copy { margin-top: 8px; background: transparent; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
  .s-copy:hover { background: rgba(201,168,76,0.1); }

  .notif { position: fixed; bottom: 20px; right: 20px; background: var(--navy); border: 1px solid var(--gold); border-radius: 7px; padding: 10px 18px; font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--gold); letter-spacing: 0.05em; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
  .notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🏯 Osaka Castle Tour</h1>
  <p>Handler Controller · 1615 The Summer Siege</p>
</header>

<div class="tour-switcher" id="tourSwitcher"></div>

<div class="status-bar">
  <div><span class="dot" id="dot"></span><span class="lbl">Firebase: </span><span class="val" id="fbStatus">Connecting…</span></div>
  <div><span class="lbl">Slide: </span><span class="val" id="curLabel">—</span></div>
</div>

<div class="now-playing" id="npBox">
  <div class="np-lbl">▶ Now Showing</div>
  <div class="np-title" id="npTitle">—</div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="main-controls">
  <button class="ctrl-btn ctrl-prev" onclick="navigate(-1)">← Prev</button>
  <button class="ctrl-btn ctrl-replay" onclick="replayAudio()">↺ Replay</button>
  <button class="ctrl-btn ctrl-next" onclick="navigate(1)">Next →</button>
</div>

<hr>
<div class="sec-lbl">All Slides — Tap to Jump</div>
<div class="slides-grid" id="slidesGrid"></div>

<hr>
<div class="session-box">
  <div class="s-lbl">Guest Viewer URL</div>
  <div class="s-url" id="viewerUrl">Loading…</div>
  <button class="s-copy" onclick="copyUrl()">Copy URL</button>
</div>

<div class="notif" id="notif"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase Config (osaka-castle-tour) ──────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCnzUg5_UkJmhfQQuoJ7mbNMli5lBsFWKw",
  authDomain: "osaka-castle-tour.firebaseapp.com",
  databaseURL: "https://osaka-castle-tour-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "osaka-castle-tour",
  storageBucket: "osaka-castle-tour.firebasestorage.app",
  messagingSenderId: "82330141589",
  appId: "1:82330141589:web:945254147c2c27f042ac9c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tourRef = ref(db, 'siege_tour');

// ── Tour Definitions ──────────────────────────────────────────
// NOTE: This SLIDES data is duplicated in osaka-tour-viewer.html.
// If you edit slides here, mirror the same edit there.
const TOURS = {
  character_tour: {
    label: 'Character\nTour',
    slides: [
      { id:'characters', num:'✦', title:'Commanders of 1615',          subtitle:'Character Introduction',                audio:null },
      { id:'slide-1',   num:'1',  title:'1615: The Summer Siege',       subtitle:'Title · Opening',                      audio:'audio-01.mp3.mp3' },
      { id:'slide-2',   num:'2',  title:'The Board is Set',             subtitle:'Tokugawa vs Toyotomi',                 audio:'audio-02.mp3.mp3' },
      { id:'slide-3',   num:'3',  title:'Opposing Philosophies',        subtitle:'Hidetada vs Ono Harunaga',             audio:'audio-03.mp3.mp3' },
      { id:'slide-4',   num:'4',  title:"Shogun's Bloodline",           subtitle:'The Tokugawa family at war',           audio:'audio-04.mp3.mp3' },
      { id:'slide-5',   num:'5',  title:'The Generation of 1600',       subtitle:'The Youth in War',                     audio:'audio-05.mp3.mp3' },
      { id:'slide-6',   num:'6',  title:'Cost of the Vanguard',         subtitle:'Honda Tadamasa · Ogasawara',           audio:'audio-06.mp3.mp3' },
      { id:'slide-7',   num:'7',  title:'Pillars of Resistance',        subtitle:'Mori Katsunaga',                       audio:'audio-07.mp3.mp3' },
      { id:'slide-8',   num:'8',  title:'Factions Within the Fortress', subtitle:'Ono Harunaga · Ono Harufusa',          audio:'audio-08.mp3.mp3' },
      { id:'slide-9',   num:'9',  title:'The Climax at Tennoji',        subtitle:"Sanada Yukimura's Final Charge",       audio:'audio-09.mp3.mp3' },
      { id:'slide-10',  num:'10', title:'The Tokugawa Legacy',          subtitle:'260 Years · The Meiji Era 1868',       audio:'audio-10.mp3.mp3' },
    ]
  },
  siege_narrative: {
    label: 'Siege\nNarrative',
    slides: [
      { id:'n-characters', num:'✦', title:'Heroes of the Narrative',       subtitle:'Featured Commanders',                  audio:null },
      { id:'n-1', num:'1', title:'Prelude to a Renewed War',                subtitle:'Winter Truce Broken',                  audio:'siege-01.mp3' },
      { id:'n-2', num:'2', title:'The Battle of Kashii',                    subtitle:'Harufusa & Naoyuki vs. Nagaakira',     audio:'siege-02.mp3' },
      { id:'n-3', num:'3', title:'Domyoji — The Last Stand',                subtitle:'Goto Mototsugu',                       audio:'siege-03.mp3' },
      { id:'n-4', num:'4', title:'Domyoji — The Retreat',                   subtitle:"Sanada Daisuke's First Battle",        audio:'siege-04.mp3' },
      { id:'n-5', num:'5', title:'The Battle of Yao-Wakae',                 subtitle:'Kimura Shigenari · Chosokabe',         audio:'siege-05.mp3' },
      { id:'n-6', num:'6', title:'Tennoji-Okayama — The Formation',         subtitle:'Eve of the Final Battle',              audio:'siege-06.mp3' },
      { id:'n-7', num:'7', title:"Yukimura's Charge",                       subtitle:"Strike on Ieyasu's Headquarters",      audio:'siege-07.mp3' },
      { id:'n-8', num:'8', title:'The Fall of Osaka Castle',                subtitle:'Lady Yodo · Hideyori',                 audio:'siege-08.mp3' },
      { id:'n-9', num:'9', title:'Epilogue — The Age of Peace',             subtitle:'260 Years to the Meiji Era',           audio:'siege-09.mp3' },
    ]
  }
};

// ── State ──────────────────────────────────────────────────────
let currentTourId = 'character_tour';
let tourIndex = { character_tour: 0, siege_narrative: 0 };

function curSlides() { return TOURS[currentTourId].slides; }
function currentIndex() { return tourIndex[currentTourId]; }

function pushState(extra = {}) {
  const slide = curSlides()[currentIndex()];
  set(tourRef, {
    tourId: currentTourId,
    slideIndex: currentIndex(),
    slideId: slide.id,
    updatedAt: Date.now(),
    ...extra
  });
}

// ── Render: Tour Switcher ──────────────────────────────────────
function renderTourSwitcher() {
  const wrap = document.getElementById('tourSwitcher');
  wrap.innerHTML = '';
  Object.keys(TOURS).forEach(tid => {
    const btn = document.createElement('button');
    btn.className = 'tour-tab' + (tid === currentTourId ? ' active' : '');
    btn.style.whiteSpace = 'pre-line';
    btn.textContent = TOURS[tid].label;
    btn.onclick = () => {
      currentTourId = tid;
      pushState();
      updateUI();
      showNotif('⇄ Switched to ' + TOURS[tid].label.replace('\n', ' '));
    };
    wrap.appendChild(btn);
  });
}

// ── Render: Slides ──────────────────────────────────────────────
function renderSlides() {
  const grid = document.getElementById('slidesGrid');
  grid.innerHTML = '';
  curSlides().forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'slide-btn' + (i === currentIndex() ? ' active' : '');
    btn.innerHTML = `
      <div class="slide-num">${s.num}</div>
      <div class="slide-info">
        <div class="slide-title">${s.title}</div>
        <div class="slide-sub">${s.subtitle}</div>
      </div>
      ${s.audio ? '<span class="audio-badge">♪</span>' : ''}
    `;
    btn.onclick = () => goTo(i);
    grid.appendChild(btn);
  });
}

function updateUI() {
  renderTourSwitcher();
  const slide = curSlides()[currentIndex()];
  document.getElementById('curLabel').textContent = `${slide.num} — ${slide.title}`;
  const npBox = document.getElementById('npBox');
  if (slide.audio) {
    npBox.style.display = 'block';
    document.getElementById('npTitle').textContent = slide.title;
  } else {
    npBox.style.display = 'none';
  }
  renderSlides();
}

// ── Navigation ────────────────────────────────────────────────
window.navigate = function(dir) { goTo(currentIndex() + dir); };
window.replayAudio = function() { pushState({ replay: Date.now() }); showNotif('↺ Replaying audio'); };

function goTo(i) {
  const slides = curSlides();
  tourIndex[currentTourId] = Math.max(0, Math.min(i, slides.length - 1));
  pushState();
  updateUI();
  showNotif('→ ' + slides[currentIndex()].title);
}

// ── Firebase listen (for UI sync) ─────────────────────────────
onValue(tourRef, (snap) => {
  const data = snap.val();
  if (data && data.slideIndex !== undefined) {
    currentTourId = data.tourId || 'character_tour';
    tourIndex[currentTourId] = data.slideIndex;
    updateUI();
  }
  document.getElementById('dot').className = 'dot live';
  document.getElementById('fbStatus').textContent = 'Connected';
}, (err) => {
  document.getElementById('dot').className = 'dot err';
  document.getElementById('fbStatus').textContent = 'Error: ' + err.message;
});

// ── Viewer URL ────────────────────────────────────────────────
const viewerUrl = window.location.href.replace('osaka-tour-controller', 'osaka-tour-viewer');
document.getElementById('viewerUrl').textContent = viewerUrl;

window.copyUrl = function() {
  navigator.clipboard.writeText(viewerUrl).then(() => showNotif('URL Copied!'));
};

// ── Notification ──────────────────────────────────────────────
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ──────────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
