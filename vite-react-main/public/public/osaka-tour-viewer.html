<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1615: The Summer Siege of Osaka</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --crimson: #8B1A1A; --navy: #1A1F3C; --gold: #C9A84C;
    --cream: #F5F0E8; --dark: #0D0F1E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--dark); font-family: 'EB Garamond', serif; color: var(--cream); }

  #app { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

  .screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; }
  .screen.active { display: block; }

  /* ── WAITING ─────────────────────────────── */
  #screen-waiting { display: none; flex-direction: column; align-items: center; justify-content: center; background: var(--dark); text-align: center; padding: 40px; }
  #screen-waiting.active { display: flex; }
  .mon { font-size: 4rem; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
  .wait-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 10px; }
  .wait-sub { font-size: 0.85rem; color: #666; font-style: italic; }
  .er31 { margin-top: 30px; font-family: 'Cinzel', serif; font-size: 0.6rem; color: #333; letter-spacing: 0.25em; }

  /* ── CHARACTERS ──────────────────────────── */
  .chars-screen { background: var(--dark); padding: 28px 18px 50px; display: none; }
  .chars-screen.active { display: block; }
  .chars-hd { text-align: center; margin-bottom: 28px; }
  .eyebrow { font-family: 'Cinzel', serif; font-size: 0.62rem; color: var(--gold); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 9px; }
  .chars-hd h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--cream); font-weight: 900; line-height: 1.2; }
  .chars-hd h1 span { color: var(--gold); }
  .gold-rule { width: 50px; height: 1px; background: var(--gold); margin: 14px auto; }
  .chars-hd p { font-size: 0.88rem; color: #aaa; font-style: italic; }

  .faction-ttl { font-family: 'Cinzel', serif; font-size: 0.67rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 7px 12px; border-radius: 4px; margin: 18px 0 12px; display: inline-block; }
  .faction-ttl.tok { background: rgba(26,31,60,0.8); color: #7AA0D4; border: 1px solid rgba(122,160,212,0.4); }
  .faction-ttl.toy { background: rgba(139,26,26,0.4); color: #E07070; border: 1px solid rgba(224,112,112,0.4); }

  .char-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.18); border-radius: 9px; padding: 13px; margin-bottom: 9px; display: flex; gap: 11px; align-items: flex-start; }
  .char-card.tok { border-left: 3px solid #7AA0D4; }
  .char-card.toy { border-left: 3px solid #E07070; }
  .char-icon { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 1px solid rgba(201,168,76,0.25); overflow: hidden; background-size: cover; background-position: center; }
  .char-icon.tok { background-color: rgba(26,31,60,0.8); }
  .char-icon.toy { background-color: rgba(139,26,26,0.4); }
  .char-info { flex: 1; }
  .char-name { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--gold); margin-bottom: 3px; }
  .char-role { font-size: 0.73rem; color: #aaa; line-height: 1.4; }
  .char-fate { font-size: 0.68rem; color: #777; margin-top: 3px; font-style: italic; }

  /* ── SLIDE SCREEN ────────────────────────── */
  .slide-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; display: none; }
  .slide-screen.active { display: block; }
  .slide-img-wrap { position: absolute; top: 0; left: 0; right: 0; bottom: 160px; overflow: hidden; transition: bottom 0.3s ease; }
  .slide-img-wrap img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; background: var(--dark); }
  .slide-img-wrap .no-img { width: 100%; height: 100%; background: linear-gradient(135deg, var(--navy), var(--dark)); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
  .slide-img-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 38%; background: linear-gradient(transparent, var(--dark)); pointer-events: none; }

  .slide-info-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 18px 16px; background: var(--dark); max-height: 45vh; overflow-y: auto; transition: transform 0.3s ease, opacity 0.3s ease; transform: translateY(0); opacity: 1; }

  /* Hidden state — info bar slides down out of view, image expands to fill */
  .slide-screen.info-hidden .slide-img-wrap { bottom: 0; }
  .slide-screen.info-hidden .slide-info-bar { transform: translateY(100%); opacity: 0; pointer-events: none; }

  .tap-hint { position: absolute; top: 14px; right: 14px; font-family: 'Cinzel', serif; font-size: 0.55rem; color: rgba(245,240,232,0.5); letter-spacing: 0.1em; background: rgba(13,15,30,0.5); padding: 5px 10px; border-radius: 12px; pointer-events: none; transition: opacity 0.3s ease; z-index: 5; }
  .slide-screen.info-hidden .tap-hint { opacity: 0; }

  /* Landscape mode: shrink image area, compact info bar */
  @media (orientation: landscape) and (max-height: 500px) {
    .slide-img-wrap { bottom: 90px; }
    .slide-info-bar { padding: 6px 14px 8px; max-height: 35vh; }
    .stitle { font-size: 0.85rem; margin-bottom: 2px; }
    .ssub { font-size: 0.65rem; }
    .snum { font-size: 0.5rem; margin-bottom: 2px; }
    .audio-status { margin-top: 5px; padding-top: 5px; }
    .prog-bar { margin-top: 5px; }
    .dots { margin-top: 4px; }
  }
  .snum { font-family: 'Cinzel', serif; font-size: 0.58rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
  .stitle { font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700; color: var(--cream); line-height: 1.3; margin-bottom: 5px; }
  .ssub { font-size: 0.82rem; color: #aaa; font-style: italic; }

  .audio-status { display: flex; align-items: center; gap: 8px; margin-top: 11px; padding-top: 11px; border-top: 1px solid rgba(201,168,76,0.13); cursor: pointer; }
  .wave { display: flex; gap: 2px; align-items: center; height: 15px; }
  .wave span { display: block; width: 3px; background: var(--gold); border-radius: 2px; animation: wv 0.8s ease-in-out infinite; }
  .wave span:nth-child(1){height:5px;animation-delay:0s}
  .wave span:nth-child(2){height:11px;animation-delay:.1s}
  .wave span:nth-child(3){height:15px;animation-delay:.2s}
  .wave span:nth-child(4){height:9px;animation-delay:.3s}
  .wave span:nth-child(5){height:5px;animation-delay:.4s}
  @keyframes wv { 0%,100%{transform:scaleY(.5);opacity:.5} 50%{transform:scaleY(1);opacity:1} }
  .wave.paused span { animation-play-state: paused; opacity: 0.25; }
  .audio-txt { font-family: 'Cinzel', serif; font-size: 0.63rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }

  .prog-bar { height: 2px; background: rgba(201,168,76,0.13); margin-top: 12px; }
  .prog-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s linear; }

  .dots { display: flex; gap: 5px; justify-content: center; margin-top: 9px; flex-wrap: wrap; }
  .dot-item { width: 5px; height: 5px; border-radius: 50%; background: rgba(201,168,76,0.18); transition: all 0.3s; }
  .dot-item.on { background: var(--gold); width: 13px; border-radius: 3px; }

  /* ── Tour badge (small, top-left, always visible during slides) ─ */
  .tour-badge { position: absolute; top: 14px; left: 14px; font-family: 'Cinzel', serif; font-size: 0.52rem; color: rgba(245,240,232,0.55); letter-spacing: 0.15em; background: rgba(13,15,30,0.5); padding: 5px 10px; border-radius: 12px; pointer-events: none; z-index: 5; text-transform: uppercase; }

  audio { display: none; }
</style>
</head>

// ── Build slide DOM for all tours ──────────────────────────────
function buildScreens() {
  const container = document.getElementById('all-screens');

  Object.keys(TOURS).forEach(tourId => {
    const tour = TOURS[tourId];

    tour.slides.forEach((s, i) => {
      const isCharScreen = s.audio === null && s.image === null;
      const div = document.createElement('div');
      const screenId = tourId + '__' + s.id;
      div.id = 'screen-' + screenId;

      if (isCharScreen) {
        div.className = 'screen chars-screen';
        div.innerHTML = (tourId === 'siege_narrative') ? NARRATIVE_CHAR_HTML : CHAR_TOUR_HTML;
        container.appendChild(div);
        return;
      }

      div.className = 'screen slide-screen';
      div.onclick = (e) => {
        if (e.target.closest('.audio-status')) return;
        div.classList.toggle('info-hidden');
      };
      const dots = tour.slides.map((_, di) => `<div class="dot-item${di===i?' on':''}"></div>`).join('');
      div.innerHTML = `
        <div class="slide-img-wrap">
          <div class="tour-badge">${tour.label}</div>
          <div class="tap-hint">TAP TO HIDE INFO</div>
          ${s.image
            ? `<img src="${s.image}" alt="${s.title}" loading="lazy">`
            : `<div class="no-img">🏯</div>`}
        </div>
        <div class="slide-info-bar">
          <div class="snum">Slide ${s.num} of ${tour.slides.length - 1}</div>
          <div class="stitle">${s.title}</div>
          <div class="ssub">${s.subtitle}</div>
          ${s.audio ? `
          <div class="audio-status" id="audstatus-${screenId}">
            <div class="wave paused" id="wave-${screenId}">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span class="audio-txt" id="audtxt-${screenId}">Audio ready — tap to play</span>
          </div>` : ''}
          <div class="prog-bar"><div class="prog-bar-fill" id="prog-${screenId}"></div></div>
          <div class="dots">${dots}</div>
        </div>
      `;
      container.appendChild(div);
    });
  });
}

// ── Audio ─────────────────────────────────────────────────────
const player = document.getElementById('player');
let lastScreenId = null;
let lastReplay = null;

function resetAudioUI() {
  document.querySelectorAll('.wave').forEach(el => el.classList.add('paused'));
  document.querySelectorAll('[id^="audtxt-"]').forEach(el => el.textContent = 'Audio ready — tap to play');
  document.querySelectorAll('.prog-bar-fill').forEach(el => el.style.width = '0%');
}

function playAudio(screenId, slide) {
  if (!slide || !slide.audio) return;

  player.pause();
  resetAudioUI();
  player.src = slide.audio;
  player.load();

  const wave = document.getElementById('wave-' + screenId);
  const txt  = document.getElementById('audtxt-' + screenId);
  const prog = document.getElementById('prog-' + screenId);

  const statusEl = document.getElementById('audstatus-' + screenId);
  if (statusEl) {
    statusEl.onclick = () => {
      player.play().then(() => {
        if (wave) wave.classList.remove('paused');
        if (txt) txt.textContent = '♪ Playing narration…';
      });
    };
  }

  player.oncanplay = () => {
    player.play().then(() => {
      if (wave) wave.classList.remove('paused');
      if (txt)  txt.textContent = '♪ Playing narration…';
    }).catch(() => {
      if (txt) txt.textContent = '▶ Tap here to play audio';
    });
  };

  player.ontimeupdate = () => {
    if (player.duration && prog) {
      prog.style.width = (player.currentTime / player.duration * 100) + '%';
    }
  };

  player.onended = () => {
    if (wave) wave.classList.add('paused');
    if (txt)  txt.textContent = '✓ Complete';
    if (prog) prog.style.width = '100%';
  };
}

// ── Screen switch ─────────────────────────────────────────────
let currentScreenId = null;

function showScreen(screenId) {
  if (currentScreenId === screenId) return;
  currentScreenId = screenId;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + screenId);
  if (el) el.classList.add('active');
}

// ── Firebase listener ─────────────────────────────────────────
onValue(tourRef, (snap) => {
  const data = snap.val();
  if (!data || data.slideIndex === undefined) return;

  const tourId = data.tourId || 'character_tour';
  const tour = TOURS[tourId];
  if (!tour) return;
  const slide = tour.slides[data.slideIndex];
  if (!slide) return;

  const screenId = tourId + '__' + slide.id;
  showScreen(screenId);

  const isNewSlide = screenId !== lastScreenId;
  const isReplay = data.replay && data.replay !== lastReplay;

  if (slide.audio && (isNewSlide || isReplay)) {
    lastScreenId = screenId;
    lastReplay = data.replay || null;
    playAudio(screenId, slide);
  } else if (!slide.audio && isNewSlide) {
    player.pause();
    lastScreenId = screenId;
  }
});

// ── Init ──────────────────────────────────────────────────────
buildScreens();
</script>
</body>
