<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Your Access Code — Osaka Castle One Coin Tour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --ink: #1c1a17;
    --paper: #f2ede3;
    --stone: #8a8378;
    --gold: #a8823a;
    --deep-green: #2f3b2f;
    --rule: #d8d0bf;
    --vermilion: #b5452c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    max-width: 380px;
    width: 100%;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 32px 28px;
    text-align: center;
  }

  .eyebrow {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--vermilion);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 19px;
    margin-bottom: 8px;
  }

  .route-note {
    font-size: 12.5px;
    color: var(--stone);
    margin-bottom: 24px;
  }

  input {
    width: 100%;
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    letter-spacing: 0.2em;
    text-align: center;
    text-transform: uppercase;
    padding: 14px;
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    margin-bottom: 14px;
    color: var(--ink);
    background: var(--paper);
  }
  input:focus { outline: none; border-color: var(--gold); }

  button {
    width: 100%;
    font-family: 'Shippori Mincho', serif;
    font-size: 14.5px;
    font-weight: 700;
    color: #fff;
    background: var(--vermilion);
    border: none;
    padding: 15px;
    border-radius: 30px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; }

  .msg {
    margin-top: 14px;
    font-size: 12.5px;
    min-height: 16px;
  }
  .msg.error { color: var(--vermilion); }
  .msg.ok { color: var(--deep-green); }

  .no-code {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--stone);
  }
  .no-code a { color: var(--vermilion); }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Route <span id="routeLetter">A</span></div>
  <h1>Enter Your Access Code</h1>
  <p class="route-note">You'll find this 6-character code on the confirmation page after your ¥500 purchase.</p>

  <input type="text" id="codeInput" maxlength="6" placeholder="______" autocomplete="off" autocapitalize="characters">
  <button id="submitBtn">Unlock Tour</button>
  <div class="msg" id="msg"></div>

  <div class="no-code">
    Haven't purchased yet? <a href="../purchase/index.html">Get your ticket here</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Fill in with your Firebase project's web config ──────────────
  // Find this in: Firebase Console → Project Settings → General →
  // "Your apps" → Web app → SDK setup and configuration
  // These values are safe to expose publicly (they are not secrets).
  const firebaseConfig = {
  apiKey: "AIzaSyCnzUg5_UkJmhfQQuoJ7mbNMli5lBsFWKw",
  authDomain: "osaka-castle-tour.firebaseapp.com",
  databaseURL: "https://osaka-castle-tour-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "osaka-castle-tour",
};
  // ───────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(window.location.search);
  const route = (params.get('route') || 'a').toLowerCase(); // 'a' or 'b'
  document.getElementById('routeLetter').textContent = route.toUpperCase();

  const input = document.getElementById('codeInput');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');

  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });

  async function tryUnlock() {
    const code = input.value.trim();
    if (code.length !== 6) {
      msg.textContent = 'Please enter the full 6-character code.';
      msg.className = 'msg error';
      return;
    }

    btn.disabled = true;
    msg.textContent = 'Checking…';
    msg.className = 'msg';

    try {
      const snap = await get(ref(db, 'accessCodes/' + code));
      if (!snap.exists()) {
        msg.textContent = 'That code was not recognized. Please check it and try again.';
        msg.className = 'msg error';
        btn.disabled = false;
        return;
      }

      const data = snap.val();
      if (Date.now() > data.expiresAt) {
        msg.textContent = 'This code has expired (valid for 24 hours after purchase).';
        msg.className = 'msg error';
        btn.disabled = false;
        return;
      }

      sessionStorage.setItem('osakaCastleAccess', JSON.stringify({
        code,
        expiresAt: data.expiresAt,
      }));

      msg.textContent = 'Unlocked! Taking you to the tour…';
      msg.className = 'msg ok';

      const destination = `osaka-tour-viewer.html?route=${route}`;
      setTimeout(() => { window.location.href = destination; }, 700);

    } catch (err) {
      console.error(err);
      msg.textContent = 'Something went wrong. Please try again.';
      msg.className = 'msg error';
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
</script>

</body>
</html>
